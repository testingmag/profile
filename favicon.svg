<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="#f5f0e8"/>

  <!-- Legs -->
  <line x1="28" y1="48" x2="12" y2="40" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="56" x2="10" y2="56" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="64" x2="12" y2="72" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="48" x2="88" y2="40" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="56" x2="90" y2="56" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="64" x2="88" y2="72" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>

  <!-- Antennae -->
  <line x1="43" y1="29" x2="34" y2="18" stroke="#0e0e0e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="57" y1="29" x2="66" y2="18" stroke="#0e0e0e" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="16" r="3.5" fill="#0e0e0e"/>
  <circle cx="68" cy="16" r="3.5" fill="#0e0e0e"/>

  <!-- Body -->
  <ellipse cx="50" cy="60" rx="26" ry="30" fill="#b5451b"/>

  <!-- Wing divider -->
  <line x1="50" y1="31" x2="50" y2="89" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Spots -->
  <circle cx="38" cy="52" r="6" fill="#0e0e0e" opacity="0.7"/>
  <circle cx="62" cy="52" r="6" fill="#0e0e0e" opacity="0.7"/>
  <circle cx="38.5" cy="68" r="4.5" fill="#0e0e0e" opacity="0.6"/>
  <circle cx="61.5" cy="68" r="4.5" fill="#0e0e0e" opacity="0.6"/>

  <!-- Head -->
  <ellipse cx="50" cy="32" rx="17" ry="14" fill="#0e0e0e"/>

  <!-- Eyes -->
  <circle cx="43" cy="29" r="4.5" fill="#fff"/>
  <circle cx="57" cy="29" r="4.5" fill="#fff"/>
  <circle cx="44" cy="29" r="2.5" fill="#1a5f6a"/>
  <circle cx="58" cy="29" r="2.5" fill="#1a5f6a"/>
  <circle cx="44.8" cy="27.8" r="1.2" fill="#fff"/>
  <circle cx="58.8" cy="27.8" r="1.2" fill="#fff"/>

  <!-- Gold checkmark badge -->
  <circle cx="70" cy="78" r="14" fill="#c9a84c"/>
  <polyline points="63,78 68,84 78,70" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
